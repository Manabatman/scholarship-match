# Render.com blueprint - optional
# Create a Web Service and PostgreSQL database in the dashboard, then set:
# DATABASE_URL, CORS_ORIGINS, SECRET_KEY, AUTH_DISABLED=false
services:
  - type: web
    name: iskonnect-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iskonnect-db
          property: connectionString
      - key: AUTH_DISABLED
        value: "false"
      - key: CORS_ORIGINS
        sync: false  # Set in dashboard to include frontend URL
